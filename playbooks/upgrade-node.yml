---
- name: Upgrade Node
  hosts: validators:fullnodes
  become: yes
  gather_facts: yes
  serial: 1

  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault-{{ env }}.yml
    - ../group_vars/{{ env }}.yml

  tasks:
    - name: Backup keys and config
      archive:
        path:
          - "{{ monad_key_dir }}"
          - "{{ monad_config_dir }}"
        dest: "{{ monad_home }}/backups/pre-upgrade-{{ monad_version }}-{{ ansible_date_time.iso8601_basic_short }}.tar.gz"
        format: gz
      become_user: "{{ monad_user }}"
      ignore_errors: yes

    - name: Stop services
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - "{{ rpc_service_identifier }}"
        - "{{ service_identifier }}"
        - "{{ execution_service_identifier }}"
      ignore_errors: yes

    - name: Unhold monad package
      dpkg_selections:
        name: monad
        selection: install

    - name: Upgrade monad package
      apt:
        name: "monad={{ monad_version }}"
        state: present
        update_cache: yes
        allow_change_held_packages: yes

    - name: Hold monad package version
      dpkg_selections:
        name: monad
        selection: hold

    - name: Start services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - "{{ execution_service_identifier }}"
        - "{{ service_identifier }}"
        - "{{ rpc_service_identifier }}"
      ignore_errors: yes

    - name: Wait for RPC
      uri:
        url: "http://localhost:{{ monad_rpc_port }}"
        method: POST
        body: '{"jsonrpc":"2.0","method":"eth_chainId","id":1}'
        body_format: json
        headers:
          Content-Type: "application/json"
      register: rpc_check
      until: rpc_check.status == 200
      retries: 30
      delay: 10
