---
- name: Upgrade Node
  hosts: validators:fullnodes
  become: yes
  gather_facts: yes
  serial: 1
  any_errors_fatal: true
  max_fail_percentage: 0

  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault-{{ env }}.yml
    - ../group_vars/{{ env }}.yml

  tasks:
    - name: Check installed monad version
      command: dpkg-query -W -f='${Version}' monad
      register: installed_version
      changed_when: false
      failed_when: false

    - name: Skip if already at target version
      block:
        - debug:
            msg: "monad already at {{ monad_version }}, skipping upgrade"
        - meta: end_host
      when:
        - installed_version.rc == 0
        - installed_version.stdout == monad_version
        - not (force_upgrade | default(false) | bool)

    - name: Check key dir exists before backup
      stat:
        path: "{{ monad_key_dir }}"
      register: key_dir_stat

    - name: Backup keys and critical config
      archive:
        path:
          - "{{ monad_key_dir }}"
          - "{{ monad_node_config_file }}"
          - "{{ monad_validators_dir }}"
        dest: "{{ monad_home }}/backups/pre-upgrade-{{ monad_version }}-{{ ansible_date_time.iso8601_basic_short }}.tar.gz"
        format: gz
      become_user: "{{ monad_user }}"
      when: key_dir_stat.stat.exists

    - name: Stop services
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - "{{ rpc_service_identifier }}"
        - "{{ service_identifier }}"
        - "{{ execution_service_identifier }}"
      failed_when:
        - stop_result is failed
        - "'Could not find the requested service' not in (stop_result.msg | default(''))"
      register: stop_result

    - name: Unhold monad package
      dpkg_selections:
        name: monad
        selection: install

    - name: Upgrade monad package
      apt:
        name: "monad={{ monad_version }}"
        state: present
        update_cache: yes
        allow_change_held_packages: yes

    - name: Hold monad package version
      dpkg_selections:
        name: monad
        selection: hold

    - name: Start services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - "{{ execution_service_identifier }}"
        - "{{ service_identifier }}"
        - "{{ rpc_service_identifier }}"

    - name: Wait for RPC
      uri:
        url: "http://localhost:{{ monad_rpc_port }}"
        method: POST
        body: '{"jsonrpc":"2.0","method":"eth_chainId","id":1}'
        body_format: json
        headers:
          Content-Type: "application/json"
      register: rpc_check
      until: rpc_check.status == 200
      retries: 30
      delay: 10
