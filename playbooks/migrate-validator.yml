---
# Fast migrate a validator to a pre-deployed server.
#
# Preparation (do this first, can be hours/days before):
#   make deploy NODE=my-validator-new
#   make snapshot NODE=my-validator-new
#   # Wait for sync: make status NODE=my-validator-new
#
# Fast cutover:
#   make migrate OLD=my-validator NEW=my-validator-new
#   ansible-playbook -i inventory/testnet.yml playbooks/migrate-validator.yml \
#     -e old_node=my-validator -e new_node=my-validator-new
#
# Prerequisites:
#   - Both old and new hosts in inventory
#   - New node already deployed and synced
#   - Vault decrypted or password available

# =============================================================================
# PLAY 1: Stop old node and fetch keys
# =============================================================================
- name: "Migration — Stop old node and fetch keys"
  hosts: "{{ old_node | default('localhost') }}"
  become: yes
  gather_facts: no

  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault-{{ env }}.yml
    - ../group_vars/{{ env }}.yml

  tasks:
    - name: Validate extra vars
      fail:
        msg: "Required: -e old_node=<name> -e new_node=<name>"
      when: old_node is not defined or new_node is not defined
      delegate_to: localhost
      run_once: true

    - name: Compute migration staging dir on controller
      set_fact:
        migration_stage_dir: "{{ lookup('env', 'HOME') }}/.mv-manager/migrations/{{ lookup('pipe', 'date +%s') }}-{{ lookup('password', '/dev/null chars=ascii_lowercase,digits length=8') }}"
      delegate_to: localhost
      delegate_facts: true
      run_once: true

    - name: Stop services on old node
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - "{{ rpc_service_identifier }}"
        - "{{ service_identifier }}"
        - "{{ execution_service_identifier }}"
      register: stop_old_result
      failed_when:
        - stop_old_result is failed
        - "'Could not find the requested service' not in (stop_old_result.msg | default(''))"

    - name: Create staging directory on controller
      file:
        path: "{{ migration_stage_dir }}"
        state: directory
        mode: '0700'
      delegate_to: localhost
      become: no

    - name: Fetch key files from old node
      fetch:
        src: "{{ monad_key_dir }}/{{ item }}"
        dest: "{{ migration_stage_dir }}/"
        flat: yes
        mode: '0600'
      loop:
        - id-secp
        - id-bls
        - id-secp.pub
        - id-bls.pub

    - name: Fetch staking CLI config
      fetch:
        src: "{{ monad_home }}/staking-sdk-cli/config.toml"
        dest: "{{ migration_stage_dir }}/staking-config.toml"
        flat: yes
        mode: '0600'
      register: fetch_staking
      failed_when:
        - fetch_staking is failed
        - "'Unable to find' not in (fetch_staking.msg | default(''))"
        - "'file not found' not in (fetch_staking.msg | default('') | lower)"

    - name: Old node stopped
      debug:
        msg: "Services stopped on {{ old_node }} ({{ ansible_host }}). Keys fetched to {{ migration_stage_dir }}."

# =============================================================================
# PLAY 2: Swap keys and restart new node
# =============================================================================
- name: "Migration — Swap keys on new node"
  hosts: "{{ new_node | default('localhost') }}"
  become: yes
  gather_facts: yes

  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault-{{ env }}.yml
    - ../group_vars/{{ env }}.yml

  tasks:
    - name: Read migration staging dir from controller facts
      set_fact:
        migration_stage_dir: "{{ hostvars['localhost'].migration_stage_dir }}"
      run_once: true
      failed_when: migration_stage_dir is not defined or migration_stage_dir | length == 0

    - name: Stop services on new node
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - "{{ rpc_service_identifier }}"
        - "{{ service_identifier }}"
        - "{{ execution_service_identifier }}"
      register: stop_new_result
      failed_when:
        - stop_new_result is failed
        - "'Could not find the requested service' not in (stop_new_result.msg | default(''))"

    - name: Restore key files from controller
      copy:
        src: "{{ migration_stage_dir }}/{{ item }}"
        dest: "{{ monad_key_dir }}/{{ item }}"
        owner: "{{ monad_user }}"
        group: "{{ monad_group }}"
        mode: '0600'
      loop:
        - id-secp
        - id-bls

    - name: Restore public key files
      copy:
        src: "{{ migration_stage_dir }}/{{ item }}"
        dest: "{{ monad_key_dir }}/{{ item }}"
        owner: "{{ monad_user }}"
        group: "{{ monad_group }}"
        mode: '0644'
      loop:
        - id-secp.pub
        - id-bls.pub

    - name: Check staking config was fetched
      stat:
        path: "{{ migration_stage_dir }}/staking-config.toml"
      register: staking_cfg_stat
      delegate_to: localhost
      become: no

    - name: Restore staking CLI config
      copy:
        src: "{{ migration_stage_dir }}/staking-config.toml"
        dest: "{{ monad_home }}/staking-sdk-cli/config.toml"
        owner: "{{ monad_user }}"
        group: "{{ monad_group }}"
        mode: '0600'
      when: staking_cfg_stat.stat.exists

    - name: Generate name record signature
      shell: |
        /usr/local/bin/monad-sign-name-record \
          --address {{ ansible_host }}:{{ monad_p2p_port }} \
          --authenticated-udp-port {{ monad[type].consensus.ports.auth_udp_port }} \
          --self-record-seq-num {{ self_record_seq_num | default(1) }} \
          --keystore-path {{ monad_secp_key_file }} \
          --password "{{ vault_keystore_password }}" 2>&1 | awk -F'"' '/self_name_record_sig/ {print $2; exit}'
      register: name_record_sig_result
      changed_when: false
      failed_when: name_record_sig_result.stdout | default('') | trim | length == 0
      no_log: true

    - name: Set name record signature fact
      set_fact:
        self_name_record_sig: "{{ name_record_sig_result.stdout }}"

    - name: Regenerate node.toml with new IP
      template:
        src: "../roles/monad-node/templates/node.toml.j2"
        dest: "{{ monad_node_config_file }}"
        owner: "{{ monad_user }}"
        group: "{{ monad_group }}"
        mode: '0600'

    - name: Regenerate environment files with new IP
      template:
        src: "../roles/monad-node/templates/{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ monad_user }}"
        group: "{{ monad_group }}"
        mode: '0600'
      loop:
        - { src: 'monad.env.j2', dest: '{{ monad_general_env_file }}' }
        - { src: 'secrets.env.j2', dest: '{{ monad_secrets_env_file }}' }
      no_log: true

    - name: Assemble dotenv for systemd services
      ansible.builtin.assemble:
        src: "{{ monad_env_dir }}"
        dest: "{{ monad_home }}/.env"
        owner: "{{ monad_user }}"
        group: "{{ monad_group }}"
        mode: '0600'
      no_log: true

    - name: Validate WAL dir path before clearing
      assert:
        that:
          - monad_wal_dir is defined
          - monad_wal_dir | length > 0
          - monad_wal_dir is match('^/.+')
          - monad_wal_dir != '/'
        fail_msg: "Refusing to clear WAL: monad_wal_dir is empty or unsafe ({{ monad_wal_dir | default('<undef>') }})"

    - name: Find WAL files
      find:
        paths: "{{ monad_wal_dir }}"
        patterns: "*"
        hidden: true
        file_type: any
      register: wal_files

    - name: Clear WAL files
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ wal_files.files }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Find legacy wal_* dirs
      find:
        paths: "{{ monad_home }}"
        patterns: "wal_*"
        file_type: any
      register: legacy_wal

    - name: Clear legacy wal_* dirs
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ legacy_wal.files }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Start services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - "{{ execution_service_identifier }}"
        - "{{ service_identifier }}"
        - "{{ rpc_service_identifier }}"

    - name: Wait for startup
      pause:
        seconds: 30

    - name: Verify consensus service
      systemd:
        name: "{{ service_identifier }}"
      register: svc
      failed_when: svc.status.ActiveState != "active"

    - name: Check RPC
      uri:
        url: "http://localhost:{{ monad_rpc_port }}"
        method: POST
        body: '{"jsonrpc":"2.0","method":"eth_chainId","id":1}'
        body_format: json
        headers:
          Content-Type: "application/json"
        status_code: [200, 502, 503]
      register: rpc
      retries: 10
      delay: 10
      until: rpc.status == 200

    - name: Detect controller OS for secure delete
      set_fact:
        controller_system: "{{ hostvars['localhost']['ansible_system'] | default(lookup('pipe', 'uname -s')) }}"
      delegate_to: localhost
      become: no
      run_once: true

    - name: Find staged migration files for secure delete
      find:
        paths: "{{ migration_stage_dir }}"
        patterns: "*"
        hidden: true
        file_type: file
      register: stage_files
      delegate_to: localhost
      become: no

    - name: Secure delete staged key material (Linux/GNU shred)
      command: shred -u -n 3 -- {{ item.path | quote }}
      loop: "{{ stage_files.files }}"
      loop_control:
        label: "{{ item.path }}"
      delegate_to: localhost
      become: no
      changed_when: true
      when: controller_system == 'Linux'

    - name: Secure delete staged key material (macOS/BSD rm -P)
      command: rm -P -- {{ item.path | quote }}
      loop: "{{ stage_files.files }}"
      loop_control:
        label: "{{ item.path }}"
      delegate_to: localhost
      become: no
      changed_when: true
      when: controller_system in ['Darwin', 'FreeBSD', 'OpenBSD', 'NetBSD']

    - name: Secure delete staged key material (portable dd fallback)
      shell: |
        set -euo pipefail
        f={{ item.path | quote }}
        sz=$(wc -c < "$f")
        for _ in 1 2 3; do dd if=/dev/urandom of="$f" bs=1 count="$sz" conv=notrunc status=none; done
        rm -f -- "$f"
      loop: "{{ stage_files.files }}"
      loop_control:
        label: "{{ item.path }}"
      delegate_to: localhost
      become: no
      changed_when: true
      when: controller_system not in ['Linux', 'Darwin', 'FreeBSD', 'OpenBSD', 'NetBSD']

    - name: Remove staging directory
      file:
        path: "{{ migration_stage_dir }}"
        state: absent
      delegate_to: localhost
      become: no

    - name: Migration complete
      debug:
        msg: |
          Migration complete!
          Old node ({{ old_node }}): services STOPPED
          New node ({{ new_node }}): {{ svc.status.ActiveState }}
          RPC: http://{{ ansible_host }}:{{ monad_rpc_port }}

          Next steps:
          1. Verify sync: make status NODE={{ new_node }}
          2. Once synced, remove old node from inventory
