---
- name: Recovery
  hosts: validators:fullnodes
  become: yes
  gather_facts: yes

  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault-{{ env }}.yml
    - ../group_vars/{{ env }}.yml

  tasks:
    - name: Check service
      shell: systemctl status {{ item }} --no-pager
      register: status
      changed_when: false
      failed_when: false
      loop:
        - "{{ service_identifier }}"
        - "{{ execution_service_identifier }}"
        - "{{ rpc_service_identifier }}"
      tags: [diagnose]

    - name: Show status
      debug:
        var: item.stdout_lines
      loop: "{{ status.results }}"
      loop_control:
        label: "{{ item.item }}"
      tags: [diagnose]

    - name: Check errors
      shell: journalctl -u {{ item }} -n 50 --no-pager | grep -i "error\|fatal" || true
      register: errors
      changed_when: false
      loop:
        - "{{ service_identifier }}"
        - "{{ execution_service_identifier }}"
      tags: [diagnose]

    - name: Show errors
      debug:
        msg: "{{ item.item }}: {{ item.stdout_lines }}"
      loop: "{{ errors.results }}"
      loop_control:
        label: "{{ item.item }}"
      tags: [diagnose]

    - name: Stop services
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - "{{ rpc_service_identifier }}"
        - "{{ service_identifier }}"
        - "{{ execution_service_identifier }}"
      ignore_errors: yes
      tags: [recover]

    - name: Start services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - "{{ execution_service_identifier }}"
        - "{{ service_identifier }}"
        - "{{ rpc_service_identifier }}"
      ignore_errors: yes
      tags: [recover]

    - name: Wait
      pause:
        seconds: 30
      tags: [recover]

    - name: Check RPC
      uri:
        url: "http://localhost:{{ monad_rpc_port }}"
        method: POST
        body: '{"jsonrpc":"2.0","method":"eth_chainId","id":1}'
        body_format: json
        headers:
          Content-Type: "application/json"
        status_code: [200, 502, 503]
      register: rpc
      retries: 10
      delay: 10
      until: rpc.status == 200
      tags: [recover]
