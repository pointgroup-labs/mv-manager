---
- name: Restart observability stack
  community.docker.docker_compose_v2:
    project_src: "{{ observability_dir }}"
    state: present
    recreate: always
    pull: always

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted
    daemon_reload: true
