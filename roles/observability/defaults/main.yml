---
# Versions
otel_collector_version: "0.147.0"
prometheus_version: "v3.10.0"
grafana_version: "12.4.1"

# Ports (all bound to 127.0.0.1 except Grafana)
otel_grpc_port: 4317
otel_http_port: 4318
otel_metrics_port: 8888
otel_prometheus_port: 8889
prometheus_port_internal: 9090
grafana_port: 3000

# Grafana
grafana_admin_password: "{{ vault_grafana_admin_password | default('admin') }}"

# OTEL external export (Monad infra)
otel_monad_endpoint: "https://otel-external.monadinfra.com:443"

# Alert thresholds
alert_disk_threshold: 85

# Stack directory
observability_dir: "{{ monad_home }}/observability"
