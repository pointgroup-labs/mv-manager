---
- name: Create prometheus user
  user:
    name: prometheus
    system: yes
    shell: /bin/false
    create_home: no
  tags: [monitoring]

- name: Check node_exporter version
  command: /usr/local/bin/node_exporter --version
  register: ne_version_check
  changed_when: false
  failed_when: false
  tags: [monitoring]

- name: Download node_exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    mode: '0644'
  when: ne_version_check.rc != 0 or node_exporter_version not in (ne_version_check.stdout | default(''))
  tags: [monitoring]

- name: Extract node_exporter
  unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /tmp
    remote_src: yes
  when: ne_version_check.rc != 0 or node_exporter_version not in (ne_version_check.stdout | default(''))
  tags: [monitoring]

- name: Install node_exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    remote_src: yes
    mode: '0755'
    owner: root
    group: root
  notify: Restart node_exporter
  when: ne_version_check.rc != 0 or node_exporter_version not in (ne_version_check.stdout | default(''))
  tags: [monitoring]

- name: Create node_exporter systemd service
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: '0644'
  notify: Restart node_exporter
  tags: [monitoring]

- name: Enable and start node_exporter
  systemd:
    name: node_exporter
    enabled: yes
    state: started
    daemon_reload: yes
  tags: [monitoring]

- name: Clean up downloaded files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    - "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}"
  tags: [monitoring]
