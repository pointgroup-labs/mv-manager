# Monad Node role - Install and configure monad validator
---

# =============================================================================
# APT REPOSITORY SETUP
# =============================================================================
- name: Check if Category Labs GPG key exists
  stat:
    path: /etc/apt/keyrings/category-labs.gpg
  register: gpg_key_stat
  tags: [monad, install]

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when: not gpg_key_stat.stat.exists
  tags: [monad, install]

- name: Install Category Labs GPG key
  copy:
    src: category-labs.gpg
    dest: /etc/apt/keyrings/category-labs.gpg
    mode: '0644'
  when: not gpg_key_stat.stat.exists
  tags: [monad, install]

- name: Check if apt source exists
  stat:
    path: /etc/apt/sources.list.d/category-labs.sources
  register: apt_source_stat
  tags: [monad, install]

- name: Add Category Labs apt repository
  copy:
    content: |
      Types: deb
      URIs: https://pkg.category.xyz/
      Suites: noble
      Components: main
      Signed-By: /etc/apt/keyrings/category-labs.gpg
    dest: /etc/apt/sources.list.d/category-labs.sources
    mode: '0644'
  register: apt_repo
  when: not apt_source_stat.stat.exists
  tags: [monad, install]

- name: Update apt cache
  apt:
    update_cache: yes
  when: apt_repo.changed | default(false)
  tags: [monad, install]

# =============================================================================
# INSTALL MONAD PACKAGES
# =============================================================================
- name: Install monad package
  apt:
    name: "monad={{ monad_version }}"
    state: present
  tags: [monad, install]

- name: Hold monad package version
  dpkg_selections:
    name: monad
    selection: hold
  tags: [monad, install]

- name: Disable package-shipped monad-bft service (we manage our own)
  systemd:
    name: monad-bft
    enabled: no
    state: stopped
    masked: yes
  register: disable_bft_result
  failed_when:
    - disable_bft_result is failed
    - "'Could not find the requested service' not in (disable_bft_result.msg | default(''))"
    - "'not loaded' not in (disable_bft_result.msg | default(''))"
  tags: [monad, install]

- name: Initialize TrieDB storage
  command: /usr/local/bin/monad-mpt --create --storage {{ triedb_config.path }}
  args:
    creates: "{{ triedb_config.path }}/.initialized"
  become_user: "{{ monad_user }}"
  when: setup_triedb | default(false) | bool
  tags: [monad, install]

- name: Mark TrieDB as initialized
  file:
    path: "{{ triedb_config.path }}/.initialized"
    state: touch
    owner: "{{ monad_user }}"
    group: "{{ monad_group }}"
    mode: '0644'
    modification_time: preserve
    access_time: preserve
  when: setup_triedb | default(false) | bool
  tags: [monad, install]

# =============================================================================
# CONFIGURATION DOWNLOADS
# =============================================================================
- name: Download validators config
  get_url:
    url: "{{ monad_validators_config_url }}"
    dest: "{{ monad_validators_config_file }}"
    mode: '0644'
    owner: "{{ monad_user }}"
    group: "{{ monad_group }}"
    force: yes
  tags: [monad, config]

- name: Download forkpoint config
  get_url:
    url: "{{ monad_forkpoint_config_url }}"
    dest: "{{ monad_forkpoint_file }}"
    mode: '0644'
    owner: "{{ monad_user }}"
    group: "{{ monad_group }}"
    force: yes
  tags: [monad, config]

# =============================================================================
# KEYS SETUP
# =============================================================================
- name: Check if SECP key exists
  stat:
    path: "{{ monad_secp_key_file }}"
  register: secp_key_stat
  tags: [monad, keys]

- name: Check if BLS key exists
  stat:
    path: "{{ monad_bls_key_file }}"
  register: bls_key_stat
  tags: [monad, keys]

- name: Create SECP keystore
  shell: |
    /usr/local/bin/monad-keystore import \
      --ikm "{{ vault_secp_ikm }}" \
      --key-type secp \
      --keystore-path {{ monad_secp_key_file }} \
      --password "{{ vault_keystore_password }}"
  become_user: "{{ monad_user }}"
  when: not secp_key_stat.stat.exists
  no_log: true
  tags: [monad, keys]

- name: Create BLS keystore
  shell: |
    /usr/local/bin/monad-keystore import \
      --ikm "{{ vault_bls_ikm }}" \
      --key-type bls \
      --keystore-path {{ monad_bls_key_file }} \
      --password "{{ vault_keystore_password }}"
  become_user: "{{ monad_user }}"
  when: not bls_key_stat.stat.exists
  no_log: true
  tags: [monad, keys]

- name: Secure key files
  file:
    path: "{{ item }}"
    owner: "{{ monad_user }}"
    group: "{{ monad_group }}"
    mode: '0600'
  loop:
    - "{{ monad_secp_key_file }}"
    - "{{ monad_bls_key_file }}"
  tags: [monad, keys]

- name: Export SECP public key
  shell: |
    /usr/local/bin/monad-keystore recover \
      --keystore-path {{ monad_secp_key_file }} \
      --password "{{ vault_keystore_password }}" \
      --key-type secp 2>&1 | sed -n 's/.*Secp public key: \(.*\)/\1/p' \
      > {{ monad_secp_key_file }}.pub
  args:
    creates: "{{ monad_secp_key_file }}.pub"
  become_user: "{{ monad_user }}"
  no_log: true
  tags: [monad, keys]

- name: Export BLS public key
  shell: |
    /usr/local/bin/monad-keystore recover \
      --keystore-path {{ monad_bls_key_file }} \
      --password "{{ vault_keystore_password }}" \
      --key-type bls 2>&1 | sed -n 's/.*BLS public key: \(.*\)/\1/p' \
      > {{ monad_bls_key_file }}.pub
  args:
    creates: "{{ monad_bls_key_file }}.pub"
  become_user: "{{ monad_user }}"
  no_log: true
  tags: [monad, keys]

# =============================================================================
# CONFIGURATION
# =============================================================================
- name: Generate name record signature
  shell: |
    set -o pipefail
    /usr/local/bin/monad-sign-name-record \
      --address {{ ansible_host }}:{{ monad_p2p_port }} \
      --authenticated-udp-port {{ monad[type].consensus.ports.auth_udp_port }} \
      --self-record-seq-num {{ self_record_seq_num | default(1) }} \
      --keystore-path {{ monad_secp_key_file }} \
      --password "{{ vault_keystore_password }}" 2>&1
  args:
    executable: /bin/bash
  register: name_record_sig_result
  changed_when: false
  failed_when: false
  no_log: true
  tags: [monad, config]

- name: Fail on keystore password mismatch
  fail:
    msg: |
      Keystore at {{ monad_secp_key_file }} on {{ inventory_hostname }} cannot be decrypted
      with vault_keystore_password. The keystore was created with a different password.
      Either update vault_keystore_password to the original, or (if the key is unregistered)
      delete the stale keystore and redeploy:
        ssh {{ inventory_hostname }} "sudo rm -f /home/monad/key/id-secp /home/monad/key/id-bls /home/monad/key/*.pub"
  when: "'ChecksumError' in (name_record_sig_result.stdout | default('')) or 'FailedChecksumVerification' in (name_record_sig_result.stdout | default(''))"
  tags: [monad, config]

- name: Fail on other sign-name-record errors
  fail:
    msg: "monad-sign-name-record failed (rc={{ name_record_sig_result.rc }}). Output: {{ name_record_sig_result.stdout | default('<empty>') }}"
  when: name_record_sig_result.rc != 0
  tags: [monad, config]

- name: Parse name record signature
  set_fact:
    self_name_record_sig: "{{ (name_record_sig_result.stdout | regex_search('self_name_record_sig\\s*[=:]\\s*\"([^\"]+)\"', '\\1') | default([], true) | first | default('')) | trim }}"
  tags: [monad, config]

- name: Assert name record signature parsed
  assert:
    that:
      - self_name_record_sig | length > 0
    fail_msg: "Parsed signature was empty. Raw monad-sign-name-record output: {{ name_record_sig_result.stdout | default('<empty>') }}"
  when: not ansible_check_mode
  tags: [monad, config]

- name: Create monad environment file
  template:
    src: monad.env.j2
    dest: "{{ monad_general_env_file }}"
    owner: "{{ monad_user }}"
    group: "{{ monad_group }}"
    mode: '0600'
  tags: [monad, config]

- name: Create secrets environment file
  template:
    src: secrets.env.j2
    dest: "{{ monad_secrets_env_file }}"
    owner: "{{ monad_user }}"
    group: "{{ monad_group }}"
    mode: '0600'
  no_log: true
  tags: [monad, config]

- name: Assemble dotenv for systemd services
  ansible.builtin.assemble:
    src: "{{ monad_env_dir }}"
    dest: "{{ monad_home }}/.env"
    owner: "{{ monad_user }}"
    group: "{{ monad_group }}"
    mode: '0600'
  no_log: true
  tags: [monad, config]

- name: Create node.toml configuration
  template:
    src: node.toml.j2
    dest: "{{ monad_node_config_file }}"
    owner: "{{ monad_user }}"
    group: "{{ monad_group }}"
    mode: '0600'
  notify: Reload monad config
  tags: [monad, config]

# =============================================================================
# SYSTEMD SERVICE
# =============================================================================
- name: Create systemd service for monad
  template:
    src: monad-consensus.service.j2
    dest: "/etc/systemd/system/{{ service_identifier }}.service"
    mode: '0644'
  register: systemd_service
  notify: Restart monad
  tags: [monad, systemd]

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes
  when: systemd_service.changed
  tags: [monad, systemd]

- name: Enable and start monad service
  systemd:
    name: "{{ service_identifier }}"
    state: started
    enabled: yes
  tags: [monad, start]

# =============================================================================
# MONAD-CRUFT COMPATIBILITY
# =============================================================================
- name: Remove legacy self-referential monad-bft symlink
  file:
    path: "{{ monad_home }}/monad-bft"
    state: absent
  tags: [monad, config]

- name: Create ledger symlink for monad-cruft compatibility
  file:
    src: "{{ monad_data_dir }}"
    dest: "{{ monad_home }}/ledger"
    state: link
    owner: "{{ monad_user }}"
    group: "{{ monad_group }}"
    force: yes
  tags: [monad, config]

# =============================================================================
# MANAGEMENT SCRIPTS
# =============================================================================
- name: Create monad management scripts
  template:
    src: "{{ item.src }}"
    dest: "{{ monad_home }}/scripts/{{ item.dest }}"
    owner: "{{ monad_user }}"
    group: "{{ monad_group }}"
    mode: '0755'
  loop:
    - { src: 'check-sync.sh.j2', dest: 'check-sync.sh' }
    - { src: 'restart-node.sh.j2', dest: 'restart-node.sh' }
    - { src: 'view-logs.sh.j2', dest: 'view-logs.sh' }
  tags: [monad, scripts]

# =============================================================================
# VERIFICATION
# =============================================================================
- name: Wait for monad service to start
  systemd:
    name: "{{ service_identifier }}"
  register: monad_service
  until: monad_service.status.ActiveState == "active"
  retries: 6
  delay: 10
  tags: [monad, verify]

- name: Display service status
  debug:
    msg: "Monad consensus service is {{ monad_service.status.ActiveState }}"
  tags: [monad, verify]
